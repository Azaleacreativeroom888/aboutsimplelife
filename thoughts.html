<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>気づいたこと</title>
</head>
<body>

    <h1>気づいたこと</h1>

    <ul>
        <li>ネット時間は少しずつ減らせる</li>
        <li>完璧を目指さないほうが続く</li>
        <li>趣味や創作がネット依存を減らす</li>
        <li>静かな時間は心を整える</li>
        <li>大事なのは自分で時間を選ぶこと</li>
    </ul>

    <p>
        ネットを完全に断つ必要はない。
        でも、
        自分の人生をネット中心にしないことはできる。
    </p>

    <p>
        少しずつ、
        自分の時間を取り戻していこう。
    </p>

    <a href="index.html">戻る</a>

</body>
