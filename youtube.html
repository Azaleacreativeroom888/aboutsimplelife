<body>

    <h1>YouTubeを観すぎない工夫</h1>

    <p>
        YouTubeは完全にやめなくてもいい。
        ただし、「無意識」に観る時間を減らしたい。
    </p>

    <h2>今月のルール</h2>
    <ul>
        <li>観る前に目的を決める</li>
        <li>おすすめ欄をだらだら見ない</li>
        <li>1時間以内で終了する</li>
        <li>観た後に別の行動をする</li>
    </ul>

    <p>
        大事なのは、
        YouTubeに時間を奪われるのではなく、
        自分で使い方を決めること。
    </p>
