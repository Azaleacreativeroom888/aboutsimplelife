<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シンプルな時間を作る</title>
</head>
<body>

    <h1>シンプルな時間を作る</h1>

    <p>
        ネットを減らしたいなら、
        まずは短い「何も見ない時間」を作ることから始める。
    </p>

    <h2>今月の目標</h2>
    <ul>
        <li>朝30分スマホを見ない</li>
        <li>食事中はネットを見ない</li>
        <li>寝る前1時間は画面を閉じる</li>
    </ul>

    <p>
        最初から完璧を目指さなくていい。
        少しずつ静かな時間を増やしていく。
    </p>

    <a href="index.html">戻る</a>

</body>
</html>
